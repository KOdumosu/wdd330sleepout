<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Home</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>

  <body>
    <header class="divider">
      <div class="logo">
        <img src="/images/noun_Tent_2517.svg" alt="tent image for logo" />
        <a href="/index.html"> Sleep<span class="highlight">Outside</span></a>
      </div>
      <div class="cart">
        <a href="/cart/index.html">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
            <path d="M18.9 32.6..." />
          </svg>
        </a>
      </div>
    </header>

    <main class="divider">
      <!-- HERO -->
      <div class="hero">
        <img
          src="/images/banner-sm.jpg"
          srcset="/images/banner-sm.jpg 500w, /images/banner.jpg"
          alt="image of a high mountain lake"
        />
        <div class="logo logo--square">
          <img src="/images/noun_Tent_2517.svg" alt="tent image for logo" />
          <div>Sleep<span class="highlight">Outside</span></div>
        </div>
        <div class="mission">
          <p>
            Our mission is to provide you with everything you need to sleep
            outside comfortably at an affordable price.
          </p>
        </div>
      </div>

      <!--CATEGORY SECTION -->
      <section class="categories">
        <h2>Shop by Category</h2>

        <div class="category-grid">
          <!-- TENTS -->
          <a href="/product_listing/index.html?category=tents" class="category-card">
            <img src="/images/tent.svg" alt="Tents" />
            <h3>Tents</h3>
          </a>

          <!-- BACKPACKS -->
          <a href="/product_listing/index.html?category=backpacks" class="category-card">
            <img src="/images/backpack.svg" alt="Backpacks" />
            <h3>Backpacks</h3>
          </a>

          <!-- SLEEPING BAGS -->
          <a href="/product_listing/index.html?category=sleeping-bags" class="category-card">
            <img src="/images/sleeping-bag.svg" alt="Sleeping Bags" />
            <h3>Sleeping Bags</h3>
          </a>

          <!-- HAMMOCKS -->
          <a href="/product_listing/index.html?category=hammocks" class="category-card">
            <img src="/images/hammock.svg" alt="Hammocks" />
            <h3>Hammocks</h3>
          </a>
        </div>
      </section>
    </main>

    <footer>
      &copy;2025 ⛺ SleepOutside ⛺ WDD 330 ⛺ BYU-Idaho for BYU-Pathway Worldwide Online
    </footer>
  </body>
</html>
